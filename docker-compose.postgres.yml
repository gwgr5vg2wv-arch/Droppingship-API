services:
  postgres:
    image: postgres:16-alpine
    container_name: droppingship-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: droppingship_dev
      POSTGRES_USER: droppingship
      POSTGRES_PASSWORD: local
    ports:
      - "5432:5432"
    volumes:
      - droppingship_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U droppingship -d droppingship_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  droppingship_postgres_data:
